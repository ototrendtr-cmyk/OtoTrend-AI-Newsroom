<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>OtoTrend AI Newsroom</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary">

    <div class="container-fluid">

        <span class="navbar-brand mb-0 h1">

            🚗 OtoTrend AI Newsroom

        </span>

    </div>

</nav>

<div class="container-fluid">

    <div class="row">

        <!-- Sol Menü -->

        <div class="col-2 bg-black vh-100 border-end border-secondary">

            <div class="list-group list-group-flush mt-3">

                <a href="#"
                   class="list-group-item list-group-item-action bg-black text-light">

                    🏠 Dashboard

                </a>

                <a href="#"
                   class="list-group-item list-group-item-action bg-black text-light">

                    📰 Haberler

                </a>

                <a href="#"
                   class="list-group-item list-group-item-action bg-black text-light">

                    🤖 AI Editör

                </a>

                <a href="#"
                   class="list-group-item list-group-item-action bg-black text-light">

                    📨 Telegram

                </a>

                <a href="#"
                   class="list-group-item list-group-item-action bg-black text-light">

                    ⚙ Ayarlar

                </a>

            </div>

        </div>

        <!-- İçerik -->

        <div class="col-10 p-4">

            {% block content %}

            {% endblock %}

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
